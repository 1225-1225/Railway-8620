# Railway-8620 RAGFlow 知识库服务
# 自包含编排，无需外部依赖
#
# 启动: docker compose -f docker-compose.ragflow.yml up -d
# 首次启动会自动创建知识库并上传文档

services:
  # ===== MySQL（RAGFlow 元数据存储） =====
  mysql:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ragflow_root_password
      MYSQL_DATABASE: rag_flow
    volumes:
      - ragflow_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-pragflow_root_password"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - ragflow
    restart: unless-stopped

  # ===== Redis（RAGFlow v0.26.4 必需依赖） =====
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass infini_rag_flow
    volumes:
      - ragflow_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ragflow
    restart: unless-stopped

  # ===== Elasticsearch（RAGFlow 全文检索） =====
  es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.0
    environment:
      - cluster.name=ragflow
      - node.name=ragflow
      - discovery.type=single-node
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ragflow_es:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q green || grep -q yellow"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - ragflow
    restart: unless-stopped

  # ===== MinIO（RAGFlow 文档存储） =====
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rag_flow
      MINIO_ROOT_PASSWORD: infini_rag_flow
    volumes:
      - ragflow_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ragflow
    restart: unless-stopped

  # ===== RAGFlow 核心服务 =====
  ragflow:
    image: infiniflow/ragflow:latest
    depends_on:
      mysql:
        condition: service_healthy
      es:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "9380:80"
    volumes:
      - ragflow_data:/ragflow/data
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=ragflow_root_password
      - MYSQL_DATABASE=rag_flow
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=infini_rag_flow
      - ES_HOST=es
      - ES_PORT=9200
      - API_PROXY_SCHEME=python
    networks:
      - ragflow
    restart: unless-stopped

networks:
  ragflow:
    driver: bridge

volumes:
  ragflow_mysql:
  ragflow_redis:
  ragflow_es:
  ragflow_data:
  ragflow_minio:
